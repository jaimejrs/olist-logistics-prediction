<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      text{font-family:'Segoe UI',Arial,sans-serif;}
      .ct{fill:#2B2B2B;font-weight:600;font-size:13px;}
      .cs{fill:#9AA5A8;font-size:10px;}
      .kpi{fill:#5A6B6F;font-weight:600;font-size:11px;letter-spacing:.3px;}
      .flt{fill:#5A6B6F;font-weight:600;font-size:10px;letter-spacing:.4px;}
      .ft{fill:#9AA5A8;font-size:10px;}
    </style>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0B5563" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F5F7F8"/>

  <!-- HEADER -->
  <rect width="1280" height="64" fill="#0B5563"/>
  <rect y="62" width="1280" height="2" fill="#0CAA9E"/>
  <text x="32" y="40" fill="#FFFFFF" font-weight="700" font-size="24">olist<tspan fill="#0CAA9E">.</tspan></text>
  <text x="640" y="39" text-anchor="middle" fill="#FFFFFF" font-weight="600" font-size="18">Visão Executiva</text>
  <rect x="1060" y="18" width="188" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="1078" y="36" fill="#FFFFFF" font-size="11">📅  Período: 2017 – 2018</text>

  <!-- FILTER PANEL -->
  <rect x="0" y="64" width="220" height="632" fill="#FFFFFF"/>
  <line x1="220" y1="64" x2="220" y2="696" stroke="#E6EBED"/>
  <polygon points="20,86 36,86 30,94 30,102 26,102 26,94" fill="#0CAA9E"/>
  <text x="44" y="98" class="flt" font-size="12" letter-spacing="1">FILTROS</text>
  <text x="160" y="98" class="cs" fill="#0CAA9E">Limpar</text>
  <g>
    <text x="20" y="124" class="flt">PERÍODO</text><rect x="20" y="130" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
    <text x="20" y="178" class="flt">ANO / TRIMESTRE</text><rect x="20" y="184" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
    <text x="20" y="232" class="flt">UF DO CLIENTE</text><rect x="20" y="238" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
    <text x="20" y="286" class="flt">UF DO SELLER</text><rect x="20" y="292" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
    <text x="20" y="340" class="flt">CATEGORIA</text><rect x="20" y="346" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
    <text x="20" y="394" class="flt">TIPO DE PAGAMENTO</text><rect x="20" y="400" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
    <text x="20" y="448" class="flt">SITUAÇÃO DA ENTREGA</text>
    <rect x="20" y="454" width="87" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/><text x="63" y="471" text-anchor="middle" class="cs">No prazo</text>
    <rect x="113" y="454" width="87" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/><text x="156" y="471" text-anchor="middle" class="cs">Atrasado</text>
  </g>

  <!-- KPI ROW (5 cards) -->
  <g filter="url(#sh)">
    <rect x="244" y="88" width="189" height="92" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="449" y="88" width="189" height="92" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="654" y="88" width="189" height="92" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="859" y="88" width="189" height="92" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="1064" y="88" width="189" height="92" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
  </g>
  <rect x="244" y="88" width="4" height="92" rx="2" fill="#0B5563"/><text x="262" y="110" class="kpi">PEDIDOS ENTREGUES</text>
  <rect x="449" y="88" width="4" height="92" rx="2" fill="#E4572E"/><text x="467" y="110" class="kpi">TAXA DE ATRASO</text>
  <rect x="654" y="88" width="4" height="92" rx="2" fill="#F2B705"/><text x="672" y="110" class="kpi">NOTA MÉDIA (1–5)</text>
  <rect x="859" y="88" width="4" height="92" rx="2" fill="#0CAA9E"/><text x="877" y="110" class="kpi">LEAD TIME MÉDIO</text>
  <rect x="1064" y="88" width="4" height="92" rx="2" fill="#E4572E"/><text x="1082" y="110" class="kpi">% REVIEW RUIM</text>

  <!-- CHART ROW A -->
  <g filter="url(#sh)">
    <rect x="244" y="196" width="498" height="234" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="758" y="196" width="498" height="234" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
  </g>
  <text x="260" y="222" class="ct">Pedidos e taxa de atraso por mês</text><text x="260" y="238" class="cs">Sazonalidade e risco no tempo · Q3</text>
  <rect x="256" y="248" width="474" height="170" rx="4" fill="#FBFCFC"/>
  <text x="774" y="222" class="ct">Nota média e % review ruim por trimestre</text><text x="774" y="238" class="cs">A satisfação melhora ou piora? · Q11</text>
  <rect x="770" y="248" width="474" height="170" rx="4" fill="#FBFCFC"/>

  <!-- CHART ROW B -->
  <g filter="url(#sh)">
    <rect x="244" y="446" width="498" height="234" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="758" y="446" width="498" height="234" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
  </g>
  <text x="260" y="472" class="ct">Top categorias por taxa de atraso</text><text x="260" y="488" class="cs">Onde dói mais · Q4</text>
  <rect x="256" y="498" width="474" height="170" rx="4" fill="#FBFCFC"/>
  <text x="774" y="472" class="ct">Distribuição de review_score (1–5)</text><text x="774" y="488" class="cs">A forma da satisfação · reports/review_score_distribuicao</text>
  <rect x="770" y="498" width="474" height="170" rx="4" fill="#FBFCFC"/>

  <!-- FOOTER -->
  <rect x="0" y="696" width="1280" height="24" fill="#FFFFFF"/><line x1="0" y1="696" x2="1280" y2="696" stroke="#E6EBED"/>
  <text x="24" y="711" class="ft">Fonte: Brazilian E-Commerce Public Dataset (Kaggle) · analytics.fact_orders</text>
  <text x="1256" y="711" text-anchor="end" class="ft">Exibindo X de 96.203 pedidos · Atualizado em 27/06/2026</text>
</svg>
