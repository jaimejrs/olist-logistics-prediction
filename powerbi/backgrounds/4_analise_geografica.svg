<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      text{font-family:'Segoe UI',Arial,sans-serif;}
      .ct{fill:#2B2B2B;font-weight:600;font-size:13px;}
      .cs{fill:#9AA5A8;font-size:10px;}
      .flt{fill:#5A6B6F;font-weight:600;font-size:10px;letter-spacing:.4px;}
      .ft{fill:#9AA5A8;font-size:10px;}
    </style>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0B5563" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="scale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CAA9E"/><stop offset="0.5" stop-color="#F2B705"/><stop offset="1" stop-color="#E4572E"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#F5F7F8"/>

  <!-- HEADER -->
  <rect width="1280" height="64" fill="#0B5563"/><rect y="62" width="1280" height="2" fill="#0CAA9E"/>
  <text x="32" y="40" fill="#FFFFFF" font-weight="700" font-size="24">olist<tspan fill="#0CAA9E">.</tspan></text>
  <text x="640" y="39" text-anchor="middle" fill="#FFFFFF" font-weight="600" font-size="18">Análise Geográfica</text>
  <rect x="1060" y="18" width="188" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/><text x="1078" y="36" fill="#FFFFFF" font-size="11">📅  Período: 2017 – 2018</text>

  <!-- FILTER PANEL -->
  <rect x="0" y="64" width="220" height="632" fill="#FFFFFF"/><line x1="220" y1="64" x2="220" y2="696" stroke="#E6EBED"/>
  <polygon points="20,86 36,86 30,94 30,102 26,102 26,94" fill="#0CAA9E"/>
  <text x="44" y="98" class="flt" font-size="12" letter-spacing="1">FILTROS</text><text x="160" y="98" class="cs" fill="#0CAA9E">Limpar</text>
  <text x="20" y="124" class="flt">PERÍODO</text><rect x="20" y="130" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
  <text x="20" y="178" class="flt">ANO / TRIMESTRE</text><rect x="20" y="184" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
  <text x="20" y="232" class="flt">UF DO CLIENTE</text><rect x="20" y="238" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
  <text x="20" y="286" class="flt">UF DO SELLER</text><rect x="20" y="292" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
  <text x="20" y="340" class="flt">CATEGORIA</text><rect x="20" y="346" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
  <text x="20" y="394" class="flt">TIPO DE PAGAMENTO</text><rect x="20" y="400" width="180" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/>
  <text x="20" y="448" class="flt">SITUAÇÃO DA ENTREGA</text>
  <rect x="20" y="454" width="87" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/><text x="63" y="471" text-anchor="middle" class="cs">No prazo</text>
  <rect x="113" y="454" width="87" height="26" rx="6" fill="#F5F7F8" stroke="#E6EBED"/><text x="156" y="471" text-anchor="middle" class="cs">Atrasado</text>

  <!-- ROW A: map (7) + routes (5) -->
  <g filter="url(#sh)">
    <rect x="244" y="88" width="581" height="380" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="841" y="88" width="415" height="380" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
  </g>
  <text x="260" y="114" class="ct">Mapa do Brasil — taxa de atraso por UF</text><text x="260" y="130" class="cs">Gradiente teal → vermelho · Q1</text>
  <!-- toggle -->
  <rect x="640" y="98" width="172" height="26" rx="13" fill="#F5F7F8" stroke="#E6EBED"/>
  <rect x="642" y="100" width="86" height="22" rx="11" fill="#0CAA9E"/><text x="685" y="115" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">UF cliente</text>
  <text x="770" y="115" text-anchor="middle" class="cs">UF seller</text>
  <rect x="256" y="140" width="557" height="290" rx="4" fill="#FBFCFC"/>
  <!-- color scale legend -->
  <rect x="280" y="404" width="160" height="8" rx="4" fill="url(#scale)"/>
  <text x="280" y="426" class="cs">menor atraso</text><text x="440" y="426" text-anchor="end" class="cs">maior atraso</text>
  <text x="857" y="114" class="ct">Top 10 rotas seller → cliente</text><text x="857" y="130" class="cs">Rotas críticas para intervenção · Q10</text>
  <rect x="853" y="140" width="391" height="318" rx="4" fill="#FBFCFC"/>

  <!-- ROW B: rankings 6+6 -->
  <g filter="url(#sh)">
    <rect x="244" y="484" width="498" height="196" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
    <rect x="758" y="484" width="498" height="196" rx="8" fill="#FFFFFF" stroke="#E6EBED"/>
  </g>
  <text x="260" y="510" class="ct">Ranking UF cliente — destino</text><text x="260" y="526" class="cs">Taxa de atraso + lead time médio · Q1</text>
  <rect x="256" y="536" width="474" height="136" rx="4" fill="#FBFCFC"/>
  <text x="774" y="510" class="ct">Ranking UF seller — origens problemáticas</text><text x="774" y="526" class="cs">Onde os atrasos nascem · Q5</text>
  <rect x="770" y="536" width="474" height="136" rx="4" fill="#FBFCFC"/>

  <!-- FOOTER -->
  <rect x="0" y="696" width="1280" height="24" fill="#FFFFFF"/><line x1="0" y1="696" x2="1280" y2="696" stroke="#E6EBED"/>
  <text x="24" y="711" class="ft">Fonte: Brazilian E-Commerce Public Dataset (Kaggle) · analytics.fact_orders</text>
  <text x="1256" y="711" text-anchor="end" class="ft">Exibindo X de 96.203 pedidos · Atualizado em 27/06/2026</text>
</svg>
